server:
  url: "http://localhost:8080/api/v1/logs"
  api_key: "default-api-key-change-me"

agent:
  batch_size: 100
  flush_interval_ms: 5000

collectors:
  # On Windows, uncomment these to collect from Event Viewer
  windows_events:
    - Application
    - System
    - Security

  # On Linux/macOS, uncomment these to collect from files
  files:
    - /var/log/syslog
    - /var/log/auth.log
    # - /var/log/system.log # for macOS
