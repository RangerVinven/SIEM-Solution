spring.application.name=log-analysis-service
server.port=8082
spring.datasource.url=jdbc:postgresql://localhost:5002/analysis_db
spring.datasource.username=siem_user
spring.datasource.password=siem_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=log-analysis-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=siem.models.RawSiemEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=siem.models
account.service.url=http://localhost:8081
agent.service.url=http://localhost:8086
jwt.secret.key=${JWT_SECRET_KEY}
