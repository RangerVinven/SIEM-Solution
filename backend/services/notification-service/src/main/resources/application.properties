spring.application.name=notification-service
server.port=8087
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=siem.models
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=daniel@wafflewebdesign.co.uk
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=daniel@wafflewebdesign.co.uk
app.mail.to=daniel@wafflewebdesign.co.uk
brevo.template.alert.id=11

account.service.url=http://localhost:8081
agent.service.url=http://localhost:8086
